services:
  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
      args:
        API_BASE_URL: ${API_BASE_URL:-https://api.usecontent.app}
        RPC_URL_11155111: ${RPC_URL_11155111:-}
        RPC_URL_84532: ${RPC_URL_84532:-}
        RPC_URL_11155420: ${RPC_URL_11155420:-}
        RPC_URL_421614: ${RPC_URL_421614:-}
        RPC_URL_8453: ${RPC_URL_8453:-}
        RPC_URL_10: ${RPC_URL_10:-}
        RPC_URL_42161: ${RPC_URL_42161:-}
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    image: ghcr.io/akhmetovkamil/usecontent-backend:latest
    pull_policy: always
    expose:
      - "8080"
    environment:
      - PORT=8080
      - MONGO_URI=${MONGO_URI:-mongodb://mongo:27017/usecontent}
      - JWT_SECRET=${JWT_SECRET}
      - DEPLOYMENT_REGISTRY_TOKEN=${DEPLOYMENT_REGISTRY_TOKEN}
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - RPC_URL_11155111=${RPC_URL_11155111}
      - RPC_URL_84532=${RPC_URL_84532}
      - RPC_URL_11155420=${RPC_URL_11155420}
      - RPC_URL_421614=${RPC_URL_421614}
      - RPC_URL_8453=${RPC_URL_8453}
      - RPC_URL_10=${RPC_URL_10}
      - RPC_URL_42161=${RPC_URL_42161}
    depends_on:
      - mongo
      - minio
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - /mnt/HC_Volume_105141376/minio-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb myminio/user-content --ignore-existing;
      exit 0;
      "
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    restart: "no"

volumes:
  mongo_data:
