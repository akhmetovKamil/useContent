<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">useContent UC icon</title>
  <desc id="desc">Purple rounded document icon with lavender folded corner and white uc monogram.</desc>
  <defs>
    <linearGradient id="bg" x1="160" y1="120" x2="900" y2="920" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4538F0"/>
      <stop offset="1" stop-color="#3322C8"/>
    </linearGradient>
    <linearGradient id="fold" x1="724" y1="94" x2="920" y2="310" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#C9BBFF"/>
      <stop offset="1" stop-color="#9B8CFF"/>
    </linearGradient>
    <filter id="softShadow" x="60" y="60" width="904" height="904" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="30" flood-color="#1F1A73" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Main document shape -->
  <path filter="url(#softShadow)" d="M162 190C162 145.817 197.817 110 242 110H710L862 262V834C862 878.183 826.183 914 782 914H242C197.817 914 162 878.183 162 834V190Z" fill="url(#bg)"/>

  <!-- Folded corner cut/overlay -->
  <path d="M710 110L862 262H766C735.072 262 710 236.928 710 206V110Z" fill="url(#fold)"/>
  <path d="M710 110V206C710 236.928 735.072 262 766 262H862" stroke="#7D6DFF" stroke-opacity="0.22" stroke-width="2"/>

  <!-- uc monogram, based on the first version: U ends lower and C stays separate -->
  <g fill="#FFFFFF">
    <path d="M284 308H357V608C357 664.609 403.391 711 460 711C516.609 711 563 664.609 563 608V520H636V608C636 704.929 556.929 784 460 784C363.071 784 284 704.929 284 608V308Z"/>
    <path d="M647 397C762 397 834 463 862 546L794 573C775 518 728 471 650 471C575 471 516 530 516 605C516 680 575 739 650 739C729 739 776 692 795 635L863 662C835 747 763 813 647 813C528 813 441 725 441 605C441 485 528 397 647 397Z"/>
    <!-- negative inner counter approximation for C to keep it open and clean -->
    <path d="M664 533C710 533 735 555 750 583L703 604C695 589 683 581 663 581C631 581 607 606 607 639C607 672 631 697 663 697C684 697 696 688 704 672L751 693C736 723 711 745 664 745C598 745 553 699 553 639C553 579 598 533 664 533Z" fill="url(#bg)"/>
