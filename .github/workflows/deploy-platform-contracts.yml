name: Platform Billing Contracts

on:
  workflow_dispatch:
    inputs:
      network:
        description: Hardhat network
        required: true
        default: baseSepolia
        type: choice
        options:
          - sepolia
          - baseSepolia
          - optimismSepolia
          - arbitrumSepolia
          - base
          - optimism
          - arbitrum
      platformTierManagerAddress:
        description: Existing PlatformTierManager address to sync instead of redeploying
        required: false
        default: ""
        type: string
      platformStorageManagerAddress:
        description: Existing PlatformStorageManager address to sync instead of redeploying
        required: false
        default: ""
        type: string

jobs:
  deploy-platform-billing-managers:
    name: Deploy platform billing managers
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: solidity/package-lock.json

      - name: Install dependencies
        working-directory: ./solidity
        run: npm ci

      - name: Test
        working-directory: ./solidity
        run: npm test

      - name: Deploy PlatformTierManager and PlatformStorageManager
        working-directory: ./solidity
        env:
          DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          PLATFORM_TREASURY: ${{ secrets.PLATFORM_TREASURY }}
          PLATFORM_PAYMENT_TOKEN: ${{ secrets.PLATFORM_PAYMENT_TOKEN }}
          REGISTRY_API_BASE_URL: ${{ secrets.REGISTRY_API_BASE_URL }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          DEPLOYMENT_REGISTRY_TOKEN: ${{ secrets.DEPLOYMENT_REGISTRY_TOKEN }}
          PLATFORM_TIER_MANAGER_ADDRESS: ${{ inputs.platformTierManagerAddress }}
          PLATFORM_STORAGE_MANAGER_ADDRESS: ${{ inputs.platformStorageManagerAddress }}
          RPC_URL_11155111: ${{ secrets.RPC_URL_11155111 }}
          RPC_URL_84532: ${{ secrets.RPC_URL_84532 }}
          RPC_URL_11155420: ${{ secrets.RPC_URL_11155420 }}
          RPC_URL_421614: ${{ secrets.RPC_URL_421614 }}
          RPC_URL_8453: ${{ secrets.RPC_URL_8453 }}
          RPC_URL_10: ${{ secrets.RPC_URL_10 }}
          RPC_URL_42161: ${{ secrets.RPC_URL_42161 }}
        run: npx hardhat run scripts/deploy-platform-billing-managers.ts --network ${{ inputs.network }}

      - uses: actions/upload-artifact@v4
        with:
          name: platform-billing-managers-deployment-${{ inputs.network }}
          path: shared/deployments/*.json
          if-no-files-found: error
