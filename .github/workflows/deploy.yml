name: Build & Deploy

on:
  push:
    branches: [master]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/akhmetovkamil/usecontent-backend

jobs:
  frontend-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Lint
        working-directory: ./frontend
        run: npm run lint

      - name: Test
        working-directory: ./frontend
        run: npm test -- --run

      - name: Build
        working-directory: ./frontend
        run: npm run build

  backend-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Encore CLI
        run: |
          curl -L https://encore.dev/install.sh | bash
          echo "$HOME/.encore/bin" >> $GITHUB_PATH

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: ./backend
        run: npm ci

      - name: Test
        working-directory: ./backend
        run: encore test

      - name: Typecheck
        working-directory: ./backend
        run: npx tsc -p tsconfig.json --noEmit

  solidity-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: solidity/package-lock.json

      - name: Install dependencies
        working-directory: ./solidity
        run: npm ci

      - name: Test
        working-directory: ./solidity
        run: npm test

  documentation-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: documentation/package-lock.json

      - name: Install dependencies
        working-directory: ./documentation
        run: npm ci

      - name: Build
        working-directory: ./documentation
        run: npm run docs:build

  build-backend:
    runs-on: ubuntu-latest
    needs:
      - frontend-check
      - backend-check
      - solidity-check
      - documentation-check
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Encore CLI
        run: |
          curl -L https://encore.dev/install.sh | bash
          echo "$HOME/.encore/bin" >> $GITHUB_PATH

      - name: Inject MinIO credentials into infra-config
        working-directory: ./backend
        env:
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
        run: envsubst '$MINIO_ACCESS_KEY $MINIO_SECRET_KEY' < infra-config.json > infra-config.tmp && mv infra-config.tmp infra-config.json

      - name: Build Docker image
        working-directory: ./backend
        run: |
          encore build docker \
            --config=infra-config.json \
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Tag as latest
        run: docker tag ${{ env.BACKEND_IMAGE }}:${{ github.sha }} ${{ env.BACKEND_IMAGE }}:latest

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push images
        run: |
          docker push ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          docker push ${{ env.BACKEND_IMAGE }}:latest

      - name: Trigger Coolify deploy
        run: |
          curl -sSf -X POST "${{ secrets.COOLIFY_WEBHOOK_URL }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}"

      - name: Trigger Coolify documentation deploy
        run: |
          curl -sSf -X POST "${{ secrets.COOLIFY_DOCS_WEBHOOK_URL }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}"

  post-deploy-e2e:
    runs-on: ubuntu-latest
    needs: build-backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Install Playwright browser
        working-directory: ./frontend
        run: npm run e2e:install

      - name: Wait for frontend health
        run: |
          for i in {1..30}; do
            curl -fsS https://usecontent.app/healthz && exit 0
            sleep 10
          done
          exit 1

      - name: Wait for backend health
        run: |
          for i in {1..30}; do
            curl -fsS https://api.usecontent.app/health && exit 0
            sleep 10
          done
          exit 1

      - name: Run production E2E
        working-directory: ./frontend
        run: npm run e2e:prod
